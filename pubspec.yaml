name: agricare_app
description: A digital marketplace and service hub for farmers and vendors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  
  cupertino_icons: ^1.0.2
  geocoding: ^2.1.0
  url_launcher: ^6.1.14  # Keep this one (latest version)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.2.0
  firebase_core: ^3.15.2
  cloud_functions: ^5.6.2
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.2.0
  firebase_storage: ^12.3.4
  google_sign_in: ^6.2.1
  google_fonts: ^6.3.2
  carousel_slider: ^5.1.1
  flutter_svg: ^2.0.9
  flutter_polyline_points: ^2.0.0
  timer_builder: ^2.0.0
  image_picker: ^1.1.2
  # SMS functionality via url_launcher (already included)
  razorpay_flutter: ^1.3.7
  crypto: ^3.0.3
  web: ^1.1.1
  js: ^0.6.7
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/